name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        pg_version: [18]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL, build dependencies, and Perl modules
        run: |
          sudo apt-get update
          sudo apt-get install -y wget ca-certificates lsb-release
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-${{ matrix.pg_version }} postgresql-server-dev-${{ matrix.pg_version }} build-essential libipc-run-perl

      - name: Build extension
        run: |
          make USE_PGXS=1

      - name: Install extension (into system PostgreSQL)
        run: |
          sudo make USE_PGXS=1 install

      - name: Setup test cluster
        run: |
          sudo pg_createcluster ${{ matrix.pg_version }} testcluster --start
          echo "local all all trust" | sudo tee -a /etc/postgresql/${{ matrix.pg_version }}/testcluster/pg_hba.conf
          sudo -u postgres psql -p 5433 -c "ALTER SYSTEM SET autovacuum = off;"
          sudo pg_ctlcluster ${{ matrix.pg_version }} testcluster reload
          sudo -u postgres psql -p 5433 -c "CREATE USER runner WITH SUPERUSER;"
          sudo -u postgres psql -p 5433 -c "CREATE EXTENSION pg_checksums;" postgres

      - name: Run regression tests
        run: |
          make USE_PGXS=1 installcheck
        env:
          PGPORT: 5433

      - name: Show regression.diffs on failure
        if: failure()
        run: |
          if [ -f /home/runner/work/pg_checksums/pg_checksums/regression.diffs ]; then
            cat /home/runner/work/pg_checksums/pg_checksums/regression.diffs
          else
            echo "regression.diffs not found"
          fi

      - name: Show TAP test log on failure
        if: failure()
        run: |
          cat /home/runner/work/pg_checksums/pg_checksums/tmp_check/log/regress_log_*

      - name: Cleanup cluster
        if: always()
        run: |
          sudo pg_dropcluster ${{ matrix.pg_version }} testcluster --stop
